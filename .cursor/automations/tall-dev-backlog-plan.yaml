name: "Tall Dev - Backlog plan to Todo"
description: >-
  Every 10 minutes, pick one eligible Backlog task, post an implementation plan
  for team review, and move it to Todo. Never implements code or deploys.
workflow:
  triggers:
    - cron:
        cron: "*/10 * * * *"
  actions:
    - mcp:
        server:
          name: BugHerd
  prompts:
    - prompt: |
        You are the Tall Dev BugHerd Backlog planner (Phase 2). Plan comment + Todo only.

        Use BugHerd MCP. Read tool schemas before calling. Project 527751, column Backlog → Todo.

        Read repo files when available:
        - `.cursor/skills/bugherd/config.json`
        - `scripts/bugherd/automation-backlog-plan-prompt.md`

        Never implement code, deploy, change assignees, or set In progress / Ready for Tall QA.

        Max one eligible task per run.

        On each run:
        1. list_project_tasks project 527751, status Backlog. If none, one-line summary and exit.
        2. For each task, get_task_details. Stop after processing one eligible task.
        3. Skip if plan marker exists and task is already Todo.
        4. Reopened from QA: skip until explanatory comment after reopen exists (Phase 1 handles nudge).
        5. New Backlog or rework with explanatory comment: eligible.
        6. add_comment: tag requester, Understanding, Proposed fix in web/app/themes/ai-dev, branch bugherd/task-{id} and PR→main for staging deploy, ask for approval. End (via Cursor — plan).
        7. update_task status Todo (columns.todo in config).

        End summary: checked, planned task id, skipped reasons.
  model: ""
  gitConfig:
    repo: "danielmawtall/dev-automation-test"
    branch: "main"
  agentOptions:
    skipInstall: false
  memoryEnabled: false
